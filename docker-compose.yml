# Single Coolify stack, architected as logically separate subcontainers.
# Only `web` is exposed publicly; the rest talk over the internal docker network.
version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      BYOK_ENCRYPTION_KEY: ${BYOK_ENCRYPTION_KEY}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      TTS_URL: ${TTS_URL}
    ports:
      - "3000:3000"
    depends_on:
      - db
      - storage
      - tts
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: learnenglish
      POSTGRES_PASSWORD: learnenglish
      POSTGRES_DB: learnenglish
    ports:
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - storage-data:/data
    restart: unless-stopped

  tts:
    build:
      context: ./services/tts
      dockerfile: ../../Dockerfile.tts
    restart: unless-stopped

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.web
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    restart: "no"

volumes:
  db-data:
  storage-data:
