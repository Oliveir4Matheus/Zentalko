# Single Coolify stack, architected as logically separate subcontainers.
# Only `web` (and optionally `storage` for presigned URLs) is exposed publicly.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      BYOK_ENCRYPTION_KEY: ${BYOK_ENCRYPTION_KEY}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      TTS_URL: ${TTS_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
      tts:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learnenglish}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learnenglish}
      POSTGRES_DB: ${POSTGRES_DB:-learnenglish}
    # Bind to loopback only — dev can reach via localhost:5433 without
    # exposing the DB to the network. In Coolify prod, containers talk
    # over the internal docker network regardless.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learnenglish}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - storage-data:/data
    # Expose for Coolify reverse-proxy to route a public subdomain here, so
    # browsers can fetch presigned URLs. Point STORAGE_PUBLIC_URL at it.
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  tts:
    build:
      context: .
      dockerfile: Dockerfile.tts
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  db-data:
  storage-data:
