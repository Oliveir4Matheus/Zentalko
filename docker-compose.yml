# Single Coolify stack, architected as logically separate subcontainers.
# Only `web` (and optionally `storage` for presigned URLs) is exposed publicly.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      BYOK_ENCRYPTION_KEY: ${BYOK_ENCRYPTION_KEY}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      TTS_URL: ${TTS_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    expose:
      - "3000"
    # Tell Coolify's Traefik which internal port to hit. Router names
    # follow the pattern `<scheme>-<idx>-<app-uuid>-web` and Coolify
    # passes COOLIFY_RESOURCE_UUID as env but NOT as compose interpolation,
    # so the UUID is hardcoded here. Update when cloning to a new app.
    labels:
      - traefik.http.services.http-0-m10wcf7ws3folhneqaxzwjnl-web.loadbalancer.server.port=3000
      - traefik.http.services.https-0-m10wcf7ws3folhneqaxzwjnl-web.loadbalancer.server.port=3000
    networks:
      - default
      - coolify
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy
      tts:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learnenglish}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-learnenglish}
      POSTGRES_DB: ${POSTGRES_DB:-learnenglish}
    # No host port mapping — containers talk over the internal docker
    # network (service name `db`). For local dev access on 5433, see
    # docker-compose.override.yml.
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learnenglish}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - storage-data:/data
    # In Coolify, route a public subdomain to this service (port 9000) via
    # the UI instead of mapping host ports — avoids conflicts with other
    # stacks. Point STORAGE_PUBLIC_URL at that subdomain.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  tts:
    build:
      context: .
      dockerfile: Dockerfile.tts
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  migrations:
    build:
      context: .
      dockerfile: Dockerfile.migrations
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

networks:
  default:
  coolify:
    external: true

volumes:
  db-data:
  storage-data:
